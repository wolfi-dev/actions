---
name: 'build-and-publish-secdb'
description: |
  Build and push security DB.

inputs:
  workload_identity_provider:
    description: |
      GCO Workload Identity.
    required: true
    default: ''
  service_account:
    description: |
      GCP service account.
    required: false
    default: ''
  gcp_project_id:
    description: |
      GCP project id.
    required: true
    default: ''
  wolfictl_args:
    description: |
      Wolfictl args to run the advisory secdb.
    required: true
    default: ''
  gcs_apk_bucket_name:
    description: |
      GCS bucket to store the security.json.
    required: true
    default: ''
  gcs_apk_directory_name:
    description: |
      Directory to store the security.json.
    required: false
    default: ''
  enable_acl_public_read:
    description: |
      Enable acl public read (set '--canned-acl=publicRead').
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - id: auth
      name: 'Authenticate to Google Cloud'
      uses: step-security/google-github-auth@57c51210cb4d85d8a5d39dc4c576c79bd693f914 # v3.0.1
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1
      with:
        project_id: ${{ inputs.gcp_project_id }}

    - name: 'Check that GCloud is properly configured'
      run: |
        gcloud info
        gcloud --quiet alpha storage ls 1> /dev/null
      shell: bash

    - name: Build the security database
      uses: docker://ghcr.io/wolfi-dev/sdk:latest@sha256:6757bf1e4b3e12072004f2d2bbc9cb18138326eeddfc1cd21fffbb04364c00a7
      with:
        entrypoint: wolfictl
        args: ${{ inputs.wolfictl_args }}

    - name: 'Upload the security database to a bucket'
      run: |
        # Don't cache the security.json.
        gcloud --quiet alpha storage cp \
            ${{ inputs.enable_acl_public_read }} --cache-control=no-store \
            ./security.json \
            gs://${{ inputs.gcs_apk_bucket_name }}/${{ inputs.gcs_apk_directory_name}}/
      shell: bash
